<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Пост в Charma</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0015;
      color: #fff;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }
    .logo-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
      margin-top: 16px;
    }
    .logo-text {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      text-shadow: 0 0 24px rgba(180,150,255,0.9), 0 0 8px rgba(180,150,255,0.5);
    }
    .logo-tagline {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.45);
      font-family: 'DM Sans', sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 20px;
      width: 100%;
      max-width: 480px;
    }
    .author-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 22px;
      background: rgba(130,90,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #a080ff;
      overflow: hidden;
      flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .author-info { flex: 1; }
    .author-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
    }
    .post-time {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 2px;
      font-family: 'DM Sans', sans-serif;
    }
    .post-text {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(255,255,255,0.9);
      margin-bottom: 14px;
      white-space: pre-wrap;
      font-family: 'DM Sans', sans-serif;
    }
    .post-image {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 14px;
      object-fit: cover;
      max-height: 360px;
    }
    .open-btn {
      display: block;
      background: linear-gradient(135deg, #7c4dff, #a855f7);
      color: #fff;
      text-align: center;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      margin-top: 24px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 20px rgba(124,77,255,0.4);
      font-family: 'DM Sans', sans-serif;
    }
    .open-btn:hover { opacity: 0.9; }
    .loading {
      color: rgba(255,255,255,0.4);
      font-size: 15px;
      margin-top: 60px;
      font-family: 'DM Sans', sans-serif;
    }
    .error {
      color: rgba(255,80,80,0.8);
      font-size: 15px;
      margin-top: 60px;
      text-align: center;
      font-family: 'DM Sans', sans-serif;
    }
    .badge {
      display: inline-block;
      background: rgba(124,77,255,0.25);
      color: #a080ff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
      margin-left: 6px;
      vertical-align: middle;
      font-family: 'DM Sans', sans-serif;
    }
  </style>
</head>
<body>
  <div class="logo-row">
    <span class="logo-text">CHARMA</span>
    <span class="logo-tagline">ОБЩАЙСЯ · СОЗДАВАЙ · ЖИВИ</span>
  </div>

  <div id="loading" class="loading">Загружаем пост...</div>
  <div id="error" class="error" style="display:none">Пост не найден или был удалён 😔</div>
  <div id="card" class="card" style="display:none">
    <div class="author-row">
      <div class="avatar" id="avatar"></div>
      <div class="author-info">
        <div class="author-name" id="author-name"></div>
        <div class="post-time" id="post-time"></div>
      </div>
    </div>
    <div class="post-text" id="post-text"></div>
    <img class="post-image" id="post-image" style="display:none" />
  </div>

  <a class="open-btn" href="https://irchassss.github.io/charma-legal/" id="open-btn" style="display:none">
    Открыть Charma
  </a>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBRWHddkOeMBV89xGG_VF7P-VZDs5OTNFU",
      authDomain: "charma-app.firebaseapp.com",
      projectId: "charma-app",
      storageBucket: "charma-app.firebasestorage.app",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('user');
    const postId = params.get('post');

    function formatDate(ts) {
      if (!ts) return '';
      const date = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
      return date.toLocaleString('ru-RU', {
        day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
      });
    }

    async function loadPost() {
      if (!userId || !postId) { showError(); return; }
      try {
        const postRef = doc(db, 'users', userId, 'posts', postId);
        const postSnap = await getDoc(postRef);
        if (!postSnap.exists()) { showError(); return; }
        const post = postSnap.data();

        const userRef = doc(db, 'users', userId);
        const userSnap = await getDoc(userRef);
        const user = userSnap.exists() ? userSnap.data() : {};

        const avatarEl = document.getElementById('avatar');
        if (user.photoURL || user.avatarUrl) {
          avatarEl.innerHTML = `<img src="${user.photoURL || user.avatarUrl}" />`;
        } else {
          avatarEl.textContent = (user.displayName || user.name || '?')[0].toUpperCase();
        }

        document.getElementById('author-name').innerHTML =
          (user.displayName || user.name || 'Пользователь') +
          '<span class="badge">Charma</span>';
        document.getElementById('post-time').textContent = formatDate(post.createdAt);
        document.getElementById('post-text').textContent = post.text || '';

        if (post.imageUrl) {
          const img = document.getElementById('post-image');
          img.src = post.imageUrl;
          img.style.display = 'block';
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('card').style.display = 'block';
        document.getElementById('open-btn').style.display = 'block';
        document.title = `${user.displayName || user.name || 'Пост'} в Charma`;
      } catch (e) {
        console.error(e);
        showError();
      }
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }

    loadPost();
  </script>
</body>
</html>
