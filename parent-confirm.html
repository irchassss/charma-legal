<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charma — Подтверждение email</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #EEEDFE;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #534AB7;
      margin-bottom: 32px;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-wrap svg { width: 38px; height: 38px; }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #bbb;
    }
    .note a { color: #534AB7; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CHARMA</div>
    <div class="icon-wrap" id="iconWrap"></div>
    <h1 id="title"></h1>
    <p id="desc"></p>
    <div class="note">По вопросам: <a href="mailto:charma.app.support@gmail.com">charma.app.support@gmail.com</a></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const status = params.get('status');

    const states = {
      success: {
        bg: '#EEEDFE',
        svg: '<circle cx="19" cy="19" r="19" fill="#EEEDFE"/><path d="M11 19.5L16.5 25L27 13" stroke="#534AB7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>',
        title: 'Email подтверждён!',
        desc: 'Теперь вы будете получать еженедельные отчёты об активности вашего ребёнка в Charma каждое воскресенье.'
      },
      error: {
        bg: '#FCEBEB',
        svg: '<circle cx="19" cy="19" r="19" fill="#FCEBEB"/><path d="M13 13L25 25M25 13L13 25" stroke="#E24B4A" stroke-width="2.5" stroke-linecap="round"/>',
        title: 'Что-то пошло не так',
        desc: 'Не удалось подтвердить email. Попробуйте ещё раз или напишите нам.'
      },
      expired: {
        bg: '#FAEEDA',
        svg: '<circle cx="19" cy="19" r="19" fill="#FAEEDA"/><circle cx="19" cy="19" r="7" stroke="#EF9F27" stroke-width="2.2"/><path d="M19 15v4.5l2.5 2" stroke="#EF9F27" stroke-width="2" stroke-linecap="round"/>',
        title: 'Ссылка устарела',
        desc: 'Срок действия ссылки истёк (7 дней). Попросите ребёнка зайти в настройки Charma и отправить новое письмо.'
      }
    };

    const s = states[status] || states.error;
    document.getElementById('iconWrap').style.background = s.bg;
    document.getElementById('iconWrap').innerHTML =
      '<svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">' + s.svg + '</svg>';
    document.getElementById('title').textContent = s.title;
    document.getElementById('desc').textContent = s.desc;
  </script>
</body>
</html>
